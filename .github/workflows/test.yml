name: Build examples

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [hello-world, templates-basic, api-server, lambda-worker]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build ${{ matrix.example }}
        working-directory: ${{ matrix.example }}
        run: go build ./...
